<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AFK Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --surface2: #1c1c1f;
    --border: #2a2a2e;
    --text: #f0f0f0;
    --muted: #666;
    --green: #00e676;
    --green-dim: #00e67622;
    --red: #ff4444;
    --red-dim: #ff444422;
    --amber: #ffb300;
    --accent: #7c6aff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
    position: relative;
    overflow-x: hidden;
  }

  /* background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; width: 100%; max-width: 480px; }

  /* header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-top: 8px;
  }
  .logo {
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.12em;
  }
  .logo span { color: var(--accent); }
  .date-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
  }

  /* BIG BUTTON */
  .btn-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
  }

  .ring {
    position: relative;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ring-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
  .ring-fill {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 565;
    stroke-dashoffset: 565;
    transition: stroke-dashoffset 1s linear, stroke 0.4s;
  }

  #main-btn {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.04em;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    z-index: 1;
  }

  #main-btn:active { transform: scale(0.93); }

  #main-btn.state-in {
    background: radial-gradient(circle at 40% 35%, #00e67633, #00e67611);
    color: var(--green);
    box-shadow: 0 0 0 1px var(--green), 0 0 40px #00e67620, inset 0 1px 0 #00e67644;
  }
  #main-btn.state-afk {
    background: radial-gradient(circle at 40% 35%, #ff444433, #ff444411);
    color: var(--red);
    box-shadow: 0 0 0 1px var(--red), 0 0 40px #ff444420, inset 0 1px 0 #ff444444;
  }
  #main-btn.state-idle {
    background: var(--surface2);
    color: var(--muted);
    box-shadow: 0 0 0 1px var(--border);
  }

  .btn-icon { font-size: 32px; line-height: 1; }
  .btn-label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; }

  .pulse {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    animation: none;
    pointer-events: none;
  }
  #main-btn.state-in .pulse {
    animation: pulse-in 2s ease-out infinite;
    border: 1px solid var(--green);
  }
  #main-btn.state-afk .pulse {
    animation: pulse-afk 1.5s ease-out infinite;
    border: 1px solid var(--red);
  }

  @keyframes pulse-in {
    0%   { transform: scale(1);   opacity: 0.5; }
    100% { transform: scale(1.5); opacity: 0; }
  }
  @keyframes pulse-afk {
    0%   { transform: scale(1);   opacity: 0.6; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  /* live timer */
  .live-timer {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    letter-spacing: 0.05em;
    color: var(--text);
    text-align: center;
  }
  .live-timer small {
    display: block;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-top: 2px;
    text-transform: uppercase;
  }

  /* stats row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
  }
  .stat-card.in-card .stat-value { color: var(--green); }
  .stat-card.afk-card .stat-value { color: var(--red); }

  /* divider */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* export section */
  .export-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .date-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .field input[type="date"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    colorscheme: dark;
  }
  .field input[type="date"]:focus { border-color: var(--accent); }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 11px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); background: #7c6aff11; }
  .action-btn.copy-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .action-btn.csv-btn:hover { border-color: var(--amber); color: var(--amber); background: #ffb30011; }

  /* today log */
  .log-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }
  .log-table th {
    text-align: left;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .log-table td {
    padding: 9px 8px;
    border-bottom: 1px solid #1e1e22;
    color: var(--muted);
  }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table td:first-child { color: var(--text); }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
  }
  .badge-in { background: var(--green-dim); color: var(--green); }
  .badge-afk { background: var(--red-dim); color: var(--red); }

  .empty-log {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Space Mono', monospace;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">

  <!-- header -->
  <header>
    <div class="logo"><span>//</span> AFK TRACKER</div>
    <div class="date-badge" id="today-badge"></div>
  </header>

  <!-- big button -->
  <div class="btn-zone">
    <div class="ring">
      <svg class="ring-svg" viewBox="0 0 200 200">
        <circle class="ring-track" cx="100" cy="100" r="90"/>
        <circle class="ring-fill" id="ring-fill" cx="100" cy="100" r="90"/>
      </svg>
      <button id="main-btn" class="state-idle" onclick="toggle()">
        <div class="pulse"></div>
        <div class="btn-icon" id="btn-icon">⚪</div>
        <div class="btn-label" id="btn-label">Start</div>
      </button>
    </div>
    <div class="live-timer">
      <span id="live-time">00:00:00</span>
      <small id="live-label">WAITING TO START</small>
    </div>
  </div>

  <!-- stats -->
  <div class="stats-row">
    <div class="stat-card in-card">
      <div class="stat-label">⚡ In Office</div>
      <div class="stat-value" id="total-in">0:00</div>
    </div>
    <div class="stat-card afk-card">
      <div class="stat-label">💤 AFK</div>
      <div class="stat-value" id="total-afk">0:00</div>
    </div>
  </div>

  <!-- export -->
  <div class="section-label">Export</div>
  <div class="export-panel">
    <div class="date-row">
      <div class="field">
        <label>From</label>
        <input type="date" id="from-date" />
      </div>
      <div class="field">
        <label>To</label>
        <input type="date" id="to-date" />
      </div>
    </div>
    <div class="btn-row">
      <button class="action-btn copy-btn" onclick="copyLog()">
        <span>📋</span> Copy Log
      </button>
      <button class="action-btn csv-btn" onclick="exportCSV()">
        <span>⬇️</span> Export CSV
      </button>
    </div>
  </div>

  <!-- today log -->
  <div class="section-label">Today's Log</div>
  <div id="log-container"></div>

</div>

<!-- toast -->
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'afk_logs';

let state = 'idle'; // idle | in | afk
let stateStart = null;
let timerInterval = null;
let ringInterval = null;

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function nowISO() {
  return new Date().toISOString();
}
function getLogs() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}
function saveLogs(logs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
}
function pushLog(event) {
  const logs = getLogs();
  logs.push({ event, timestamp: nowISO(), date: todayStr() });
  saveLogs(logs);
}

// ---------- toggle ----------
function toggle() {
  if (state === 'idle' || state === 'afk') {
    state = 'in';
    pushLog('IN');
  } else {
    state = 'afk';
    pushLog('AFK');
  }
  stateStart = Date.now();
  updateBtn();
  updateStats();
  renderLog();
  startTimer();
}

function updateBtn() {
  const btn = document.getElementById('main-btn');
  const icon = document.getElementById('btn-icon');
  const label = document.getElementById('btn-label');
  const liveLabel = document.getElementById('live-label');
  const ring = document.getElementById('ring-fill');

  btn.className = '';
  if (state === 'in') {
    btn.classList.add('state-in');
    icon.textContent = '';
    label.textContent = "I'm Here";
    liveLabel.textContent = "IN OFFICE";
    ring.style.stroke = 'var(--green)';
  } else if (state === 'afk') {
    btn.classList.add('state-afk');
    icon.textContent = '';
    label.textContent = 'AFK';
    liveLabel.textContent = "AWAY FROM KEYBOARD";
    ring.style.stroke = 'var(--red)';
  } else {
    btn.classList.add('state-idle');
    icon.textContent = '';
    label.textContent = 'Start';
    liveLabel.textContent = "WAITING TO START";
    ring.style.stroke = 'transparent';
  }
}

// ---------- timer ----------
function fmtHMS(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return [h, m, sec].map(n => String(n).padStart(2, '0')).join(':');
}
function fmtHM(ms) {
  const total = Math.floor(ms / 60000);
  const h = Math.floor(total / 60);
  const m = total % 60;
  return h > 0 ? `${h}:${String(m).padStart(2,'0')}` : `0:${String(m).padStart(2,'0')}`;
}

function startTimer() {
  clearInterval(timerInterval);
  clearInterval(ringInterval);
  const circumference = 565;

  // ring resets every hour visually
  timerInterval = setInterval(() => {
    if (!stateStart) return;
    const elapsed = Date.now() - stateStart;
    document.getElementById('live-time').textContent = fmtHMS(elapsed);
    // ring: full circle = 30 mins
    const progress = Math.min(elapsed / (30 * 60 * 1000), 1);
    const offset = circumference - progress * circumference;
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
  }, 1000);
}

// ---------- stats ----------
function updateStats() {
  const today = todayStr();
  const logs = getLogs().filter(l => l.date === today);
  let inMs = 0, afkMs = 0;
  for (let i = 0; i < logs.length; i++) {
    const curr = new Date(logs[i].timestamp).getTime();
    const next = i + 1 < logs.length ? new Date(logs[i + 1].timestamp).getTime() : Date.now();
    const dur = next - curr;
    if (logs[i].event === 'IN') inMs += dur;
    else afkMs += dur;
  }
  document.getElementById('total-in').textContent = fmtHM(inMs);
  document.getElementById('total-afk').textContent = fmtHM(afkMs);
}

// ---------- log table ----------
function renderLog() {
  const today = todayStr();
  const logs = getLogs().filter(l => l.date === today).reverse();
  const container = document.getElementById('log-container');

  if (logs.length === 0) {
    container.innerHTML = '<div class="empty-log">No events yet today.</div>';
    return;
  }

  const allToday = [...logs].reverse();
  const rows = logs.map((log, i) => {
    const origIdx = allToday.length - 1 - i;
    const curr = new Date(log.timestamp).getTime();
    const next = origIdx + 1 < allToday.length
      ? new Date(allToday[origIdx + 1].timestamp).getTime()
      : Date.now();
    const dur = next - curr;
    const durStr = dur < 60000 ? `${Math.floor(dur/1000)}s` : fmtHM(dur);
    const time = new Date(log.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const badge = log.event === 'IN'
      ? '<span class="badge badge-in">IN</span>'
      : '<span class="badge badge-afk">AFK</span>';
    return `<tr><td>${time}</td><td>${badge}</td><td>${durStr}</td></tr>`;
  }).join('');

  container.innerHTML = `
    <table class="log-table">
      <thead><tr><th>Time</th><th>Event</th><th>Duration</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ---------- copy log ----------
function copyLog() {
  const from = document.getElementById('from-date').value;
  const to = document.getElementById('to-date').value;
  if (!from || !to) { showToast('⚠️ Pick a date range'); return; }

  const logs = getLogs().filter(l => l.date >= from && l.date <= to);
  if (logs.length === 0) { showToast('No logs in that range'); return; }

  // group by date
  const byDate = {};
  logs.forEach(l => {
    if (!byDate[l.date]) byDate[l.date] = [];
    byDate[l.date].push(l);
  });

  let text = `AFK LOG EXPORT\n${'='.repeat(40)}\n\n`;

  for (const [date, dayLogs] of Object.entries(byDate).sort()) {
    text += `📅 ${date}\n`;
    let inMs = 0, afkMs = 0, breaks = 0;
    for (let i = 0; i < dayLogs.length; i++) {
      const curr = new Date(dayLogs[i].timestamp).getTime();
      const next = i + 1 < dayLogs.length ? new Date(dayLogs[i + 1].timestamp).getTime() : null;
      const time = new Date(dayLogs[i].timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      let line = `  ${time}  ${dayLogs[i].event}`;
      if (next) {
        const dur = next - curr;
        const h = Math.floor(dur / 3600000);
        const m = Math.floor((dur % 3600000) / 60000);
        const durStr = h > 0 ? `${h}h ${m}m` : `${m}m`;
        line += `  (${durStr})`;
        if (dayLogs[i].event === 'IN') inMs += dur;
        else { afkMs += dur; breaks++; }
      }
      text += line + '\n';
    }
    const inH = Math.floor(inMs / 3600000), inM = Math.floor((inMs % 3600000) / 60000);
    const afkH = Math.floor(afkMs / 3600000), afkM = Math.floor((afkMs % 3600000) / 60000);
    text += `\n  ✅ In Office: ${inH}h ${inM}m  |  💤 AFK: ${afkH}h ${afkM}m  |  Breaks: ${breaks}\n\n`;
    text += `${'─'.repeat(40)}\n\n`;
  }

  text += `\n(Paste this to Claude and ask it to fill your timesheet)`;

  navigator.clipboard.writeText(text).then(() => {
    showToast('✅ Log copied to clipboard!');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✅ Log copied to clipboard!');
  });
}

// ---------- CSV export ----------
function exportCSV() {
  const from = document.getElementById('from-date').value;
  const to = document.getElementById('to-date').value;
  if (!from || !to) { showToast('⚠️ Pick a date range'); return; }

  const logs = getLogs().filter(l => l.date >= from && l.date <= to);
  if (logs.length === 0) { showToast('No logs in that range'); return; }

  let csv = 'date,event,timestamp,duration_minutes\n';
  logs.forEach((log, i) => {
    const curr = new Date(log.timestamp).getTime();
    const next = i + 1 < logs.length && logs[i+1].date === log.date
      ? new Date(logs[i + 1].timestamp).getTime()
      : null;
    const dur = next ? ((next - curr) / 60000).toFixed(1) : '';
    csv += `${log.date},${log.event},${log.timestamp},${dur}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `afk_log_${from}_${to}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('⬇️ CSV downloaded!');
}

// ---------- toast ----------
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ---------- init ----------
function init() {
  const today = todayStr();
  document.getElementById('today-badge').textContent = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  document.getElementById('from-date').value = today;
  document.getElementById('to-date').value = today;

  // restore last state from today's logs
  const todayLogs = getLogs().filter(l => l.date === today);
  if (todayLogs.length > 0) {
    const last = todayLogs[todayLogs.length - 1];
    state = last.event === 'IN' ? 'in' : 'afk';
    stateStart = new Date(last.timestamp).getTime();
    updateBtn();
    startTimer();
  }

  updateStats();
  renderLog();

  // update stats + log every 30s
  setInterval(() => {
    updateStats();
    renderLog();
  }, 30000);
}

init();
</script>
</body>
</html>
